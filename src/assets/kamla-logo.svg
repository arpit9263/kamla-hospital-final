<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" role="img" aria-label="Kamla Hospital">
  <defs>
    <linearGradient id="kShield" x1="10" y1="6" x2="70" y2="74" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D2A8C"/>
      <stop offset="55%" stop-color="#201060"/>
      <stop offset="100%" stop-color="#0F0A3D"/>
    </linearGradient>
    <linearGradient id="kAccent" x1="20" y1="20" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5C04A"/>
      <stop offset="100%" stop-color="#E89A1C"/>
    </linearGradient>
  </defs>

  <!-- Soft outer halo -->
  <path d="M40 3 L70 12 V36 C70 56 56 70 40 77 C24 70 10 56 10 36 V12 Z"
        fill="url(#kShield)"/>

  <!-- Inner highlight ring -->
  <path d="M40 8 L65 15 V36 C65 53 53 65 40 71 C27 65 15 53 15 36 V15 Z"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.2"/>

  <!-- Monogram K -->
  <g stroke="#FFFFFF" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="29" y1="22" x2="29" y2="56"/>
    <line x1="29" y1="40" x2="48" y2="22"/>
    <line x1="29" y1="40" x2="48" y2="58"/>
  </g>

  <!-- Heartbeat pulse -->
  <path d="M19 50 H27 L30 44 L34 56 L38 40 L42 50 H51"
        fill="none" stroke="url(#kAccent)" stroke-width="2.4"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Accent dot -->
  <circle cx="55" cy="26" r="2.4" fill="url(#kAccent)"/>
</svg>
